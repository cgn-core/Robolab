hyperparams:
  logging_level: INFO
  checkpoint_dir: checkpoints
  random_seed: 42
  num_classes: 10
  early_stopping_patience: 10

trainparams:
  batch_size: 128
  learning_rate: 1e-3
  num_epochs: 100
  weight_decay: 5e-3
  criterion: CrossEntropyLoss
  optimizer: AdamW
  dtype: float16

testparams:
  dtype: float32

dataset:
  name: CIFAR10
  train_split: 0.9
  validation_split: 0.1
